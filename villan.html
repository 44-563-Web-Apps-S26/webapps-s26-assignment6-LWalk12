<!DOCTYPE html>
<html>
    <head>
        <title>VILLAN</title>
    </head>
 
<body>

<h2>Villans by Lane Walker</h2>

<form>
    <label for="villan">Funny Man </label>
    <input type ="password" id="villan" name="form1_age" min=10 max=50 step=2 value="Joker"> <br>

    <label for="check">Guess the villan </label>
    <input type ="text" id="check" name="form1_nick" autofocus> <br>

    <input type="button" onclick="checkVillan()" value="Check the guess">
</form>

<p id="result"></p>

<div class="image">
    <img src="img/redwoodTree.jpg" alt="A Redwood Tree" id="tree" width="150" height="150" onclick="updatePic()">
</div>




<script> 

    var caught = 0
    var gotAway = 0

function checkVillan (){
    console.log("Getting form values")
    villan = document.getElementById("villan").value
    guess = document.getElementById("check").value
    
    out = document.getElementById("result")
    if(villan == guess){
        caught+=1
        alert("You caught them!")
        out.innerHTML = "caught =" + caught
    } else {
        gotAway+=1
        alert("Maybe next time :( ")
        out.innerHTML = "gotAway =" + gotAway
    }
}
</script>

<script>
    var usePic = 1
    img = document.getElementById('tree')

    function updatePic(){
        if (usePic == 1){
            img.src = 'img/empressTree.jpg'
            usePic = 2
        }else if (usePic == 2){
            img.src = 'img/kowhaiTree.jpg'
            usePic =3
        }else if (usePic = 3){
            img.src = 'img/redwoodTree.jpg'
            usePic = 1
        }
    }
</script>

</body>
</html>
