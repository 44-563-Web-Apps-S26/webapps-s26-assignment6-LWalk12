<!DOCTYPE html>
<html>
    <head>
        <title>TAXES</title>
    </head>
 
<body>

<h2>Lane Walker - tax table computation</h2>

<form>

    <label for="income">Enter income</label>
    <input type="number" value="5000" id="income">
    
    <label for="baseRate">Enter the base tax rate</label>
    <input type="number" value="0.05" id="baseRate">
    
    <label for="cutoff">Enter the cut off</label>
    <input type="number" id="cutoff" value="7500">

    <label for="extRate">Enter the extended rate</label>
    <input type="number" id="extRate" value="0.15">

    <input type="button" onclick="doTax()" value="Show tax table">
</form>


<p id="result">Taxes are: </p>

<script> 

function doTax (){

    console.log("Getting tax info")
    income = document.getElementById("income").value
    cutoff = document.getElementById("cutoff").value
    baseRate = document.getElementById("baseRate").value
    extRate = document.getElementById("extRate").value
    
    out = document.getElementById("result")

    var taxTable = ""

    for(i=1;i<=5;i++){
        incomeLevel = (income * i)
        calculatedTax = (cutoff * baseRate) + ((incomeLevel-cutoff)*extRate)
        taxTable += incomeLevel + " tax is " + calculatedTax + "; "
    }
    out.innerHTML = "Taxes are: " + taxTable
}
</script>

</body>
</html>
