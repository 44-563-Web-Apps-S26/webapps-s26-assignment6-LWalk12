<!DOCTYPE html>
<html>
    <head>
        <title>TRIP</title>
        
        </head>
 
<body>

<h2>Lane Walker travel planner</h2>

<form>
    <label for="cari">Caribbean</label>
    <input type ="checkbox" id="cari" name="cari" value=true> <br>

    <label for="medi">Mediterranean</label>
    <input type ="checkbox" id="medi" name="medi" value=true> <br>

    <label for="balt">Baltic</label>
    <input type ="checkbox" id="balt" name="balt" value=false> <br>

    <input type="button" onclick="choices()" value="Cruise Choices">
</form>

<form>
    <label for="start">Enter starting city</label>
    <input type ="text" id="start" name="start" value="Athens"> <br>

    <label for="term">Enter ending city</label>
    <input type ="text" id="term" name="term" value=""> <br>

    <input type="button" onclick="updateTrip()" value="update the trip">
</form>

<p id="result"></p>

<script> 

my_trip = {}

out = document.getElementById("result")
function choices(){
    my_trip = {}

    my_trip={
        Caribbean: document.getElementById('cari').checked,
        Mediterranean : document.getElementById('medi').checked,
        Baltic : document.getElementById('balt').checked,
    }

    out.innerHTML = JSON.stringify(my_trip)
}

function updateTrip(){
    start = document.getElementById('start').value
    end = document.getElementById('term').value

    my_trip['startCity']=start
    my_trip['endCity']=end
    
    out.innerHTML = JSON.stringify(my_trip)

}

</script>

</body>
</html>
